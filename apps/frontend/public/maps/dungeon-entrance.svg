<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000">
  <defs>
    <radialGradient id="torchGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa22" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#cc2200" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stoneTile" x="0" y="0" width="70" height="70" patternUnits="userSpaceOnUse">
      <rect width="70" height="70" fill="#5a5a5a"/>
      <!-- Brick rows offset -->
      <rect x="1" y="1" width="32" height="32" fill="#626262" rx="1"/>
      <rect x="37" y="1" width="32" height="32" fill="#595959" rx="1"/>
      <rect x="1" y="37" width="32" height="32" fill="#5d5d5d" rx="1"/>
      <rect x="37" y="37" width="32" height="32" fill="#636363" rx="1"/>
    </pattern>
    <pattern id="wallBrick" x="0" y="0" width="70" height="35" patternUnits="userSpaceOnUse">
      <rect width="70" height="35" fill="#3c3c3c"/>
      <rect x="2" y="2" width="30" height="14" fill="#444" rx="1"/>
      <rect x="36" y="2" width="30" height="14" fill="#3a3a3a" rx="1"/>
      <rect x="2" y="20" width="62" height="13" fill="#424242" rx="1"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 70 0 L 0 0 0 70" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Stone floor -->
  <rect width="1400" height="1000" fill="url(#stoneTile)"/>

  <!-- Outer walls (thick) -->
  <rect x="0" y="0" width="1400" height="80" fill="url(#wallBrick)"/>
  <rect x="0" y="920" width="1400" height="80" fill="url(#wallBrick)"/>
  <rect x="0" y="0" width="80" height="1000" fill="url(#wallBrick)"/>
  <rect x="1320" y="0" width="80" height="1000" fill="url(#wallBrick)"/>

  <!-- Inner wall dividers — left cell block -->
  <rect x="80" y="80" width="280" height="18" fill="#3c3c3c"/>
  <rect x="80" y="80" width="18" height="840" fill="#3c3c3c"/>
  <rect x="80" y="450" width="280" height="18" fill="#3c3c3c"/>
  <rect x="360" y="80" width="18" height="840" fill="#3c3c3c"/>

  <!-- Cell 1 bars (top left) -->
  <rect x="98" y="98" width="244" height="334" fill="#404040" opacity="0.6"/>
  <line x1="140" y1="98" x2="140" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="168" y1="98" x2="168" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="196" y1="98" x2="196" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="224" y1="98" x2="224" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="252" y1="98" x2="252" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="280" y1="98" x2="280" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="308" y1="98" x2="308" y2="430" stroke="#222" stroke-width="5"/>
  <line x1="336" y1="98" x2="336" y2="430" stroke="#222" stroke-width="5"/>
  <!-- Cell door (partial opening) -->
  <rect x="200" y="415" width="60" height="18" fill="#5c3a1e"/>
  <!-- Bones in cell 1 -->
  <line x1="150" y1="380" x2="200" y2="400" stroke="#e8e8cc" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="400" x2="210" y2="380" stroke="#e8e8cc" stroke-width="4" stroke-linecap="round"/>
  <circle cx="145" cy="375" r="8" fill="#e8e8cc"/>
  <line x1="270" y1="350" x2="300" y2="360" stroke="#e8e8cc" stroke-width="3" stroke-linecap="round"/>
  <line x1="275" y1="360" x2="295" y2="348" stroke="#e8e8cc" stroke-width="3" stroke-linecap="round"/>

  <!-- Cell 2 bars (bottom left) -->
  <rect x="98" y="468" width="244" height="414" fill="#404040" opacity="0.6"/>
  <line x1="140" y1="468" x2="140" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="168" y1="468" x2="168" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="196" y1="468" x2="196" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="224" y1="468" x2="224" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="252" y1="468" x2="252" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="280" y1="468" x2="280" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="308" y1="468" x2="308" y2="880" stroke="#222" stroke-width="5"/>
  <line x1="336" y1="468" x2="336" y2="880" stroke="#222" stroke-width="5"/>
  <!-- Chains in cell 2 -->
  <path d="M 160 550 Q 150 580 165 600 Q 180 620 165 650" fill="none" stroke="#888" stroke-width="5" stroke-linecap="round"/>
  <circle cx="165" cy="552" r="6" fill="none" stroke="#888" stroke-width="3"/>
  <circle cx="165" cy="650" r="6" fill="none" stroke="#888" stroke-width="3"/>
  <!-- Water puddle in cell 2 -->
  <ellipse cx="270" cy="800" rx="45" ry="20" fill="#446688" opacity="0.5"/>
  <ellipse cx="270" cy="800" rx="35" ry="12" fill="#5588aa" opacity="0.3"/>

  <!-- Main room corridor area -->
  <!-- Large wooden door at top center -->
  <rect x="590" y="0" width="220" height="90" fill="#5c3a1e"/>
  <rect x="600" y="5" width="100" height="80" fill="#6b4520"/>
  <rect x="710" y="5" width="100" height="80" fill="#6b4520"/>
  <!-- Door cross-brace -->
  <line x1="600" y1="5" x2="700" y2="85" stroke="#4a2808" stroke-width="5"/>
  <line x1="700" y1="5" x2="600" y2="85" stroke="#4a2808" stroke-width="5"/>
  <line x1="710" y1="5" x2="810" y2="85" stroke="#4a2808" stroke-width="5"/>
  <line x1="810" y1="5" x2="710" y2="85" stroke="#4a2808" stroke-width="5"/>
  <!-- Door iron bands -->
  <rect x="598" y="30" width="204" height="8" fill="#555" rx="2"/>
  <rect x="598" y="55" width="204" height="8" fill="#555" rx="2"/>
  <!-- Door ring handles -->
  <circle cx="700" cy="45" r="8" fill="none" stroke="#888" stroke-width="4"/>
  <circle cx="710" cy="45" r="8" fill="none" stroke="#888" stroke-width="4"/>

  <!-- Archway leading south (corridor) -->
  <rect x="640" y="880" width="120" height="40" fill="#5a5a5a"/>
  <text x="700" y="908" fill="rgba(255,200,100,0.5)" font-size="11" font-family="serif" text-anchor="middle">CORRIDOR</text>

  <!-- Iron portcullis on east passage -->
  <rect x="1200" y="360" width="20" height="280" fill="#3c3c3c"/>
  <line x1="1200" y1="380" x2="1320" y2="380" stroke="#444" stroke-width="8"/>
  <line x1="1200" y1="420" x2="1320" y2="420" stroke="#444" stroke-width="8"/>
  <line x1="1200" y1="460" x2="1320" y2="460" stroke="#444" stroke-width="8"/>
  <line x1="1200" y1="500" x2="1320" y2="500" stroke="#444" stroke-width="8"/>
  <line x1="1200" y1="540" x2="1320" y2="540" stroke="#444" stroke-width="8"/>
  <line x1="1200" y1="580" x2="1320" y2="580" stroke="#444" stroke-width="8"/>
  <line x1="1200" y1="620" x2="1320" y2="620" stroke="#444" stroke-width="8"/>
  <line x1="1245" y1="360" x2="1245" y2="640" stroke="#444" stroke-width="6"/>
  <line x1="1280" y1="360" x2="1280" y2="640" stroke="#444" stroke-width="6"/>

  <!-- Rubble/rocks scattered -->
  <ellipse cx="520" cy="200" rx="22" ry="16" fill="#555" stroke="#3a3a3a" stroke-width="1.5"/>
  <ellipse cx="545" cy="215" rx="14" ry="10" fill="#606060" stroke="#3a3a3a" stroke-width="1"/>
  <ellipse cx="900" cy="750" rx="25" ry="18" fill="#525252" stroke="#3a3a3a" stroke-width="1.5"/>
  <ellipse cx="925" cy="764" rx="15" ry="11" fill="#5e5e5e" stroke="#3a3a3a" stroke-width="1"/>
  <ellipse cx="750" cy="500" rx="18" ry="12" fill="#585858" stroke="#3a3a3a" stroke-width="1"/>
  <ellipse cx="450" cy="650" rx="20" ry="14" fill="#535353" stroke="#3a3a3a" stroke-width="1.5"/>
  <ellipse cx="1100" cy="200" rx="22" ry="16" fill="#555" stroke="#3a3a3a" stroke-width="1.5"/>

  <!-- Water puddle in main room -->
  <ellipse cx="780" cy="650" rx="70" ry="35" fill="#446688" opacity="0.45"/>
  <ellipse cx="780" cy="650" rx="55" ry="25" fill="#5588aa" opacity="0.25"/>

  <!-- Skeleton on floor -->
  <circle cx="700" cy="750" r="12" fill="#e0e0cc" stroke="#ccc" stroke-width="1"/>
  <line x1="700" y1="762" x2="700" y2="820" stroke="#e0e0cc" stroke-width="5" stroke-linecap="round"/>
  <line x1="675" y1="780" x2="725" y2="780" stroke="#e0e0cc" stroke-width="4" stroke-linecap="round"/>
  <line x1="700" y1="820" x2="680" y2="860" stroke="#e0e0cc" stroke-width="4" stroke-linecap="round"/>
  <line x1="700" y1="820" x2="720" y2="860" stroke="#e0e0cc" stroke-width="4" stroke-linecap="round"/>
  <line x1="675" y1="780" x2="660" y2="815" stroke="#e0e0cc" stroke-width="3" stroke-linecap="round"/>
  <line x1="725" y1="780" x2="740" y2="815" stroke="#e0e0cc" stroke-width="3" stroke-linecap="round"/>

  <!-- Torture device (rack) -->
  <rect x="900" y="160" width="120" height="60" fill="none" stroke="#5c3a1e" stroke-width="5" rx="4"/>
  <line x1="900" y1="190" x2="1020" y2="190" stroke="#5c3a1e" stroke-width="3"/>
  <line x1="920" y1="160" x2="920" y2="220" stroke="#5c3a1e" stroke-width="3"/>
  <line x1="960" y1="160" x2="960" y2="220" stroke="#5c3a1e" stroke-width="3"/>
  <line x1="1000" y1="160" x2="1000" y2="220" stroke="#5c3a1e" stroke-width="3"/>

  <!-- Torches on walls with glow -->
  <!-- Top wall torches -->
  <ellipse cx="420" cy="80" rx="55" ry="45" fill="url(#torchGlow)" opacity="0.9"/>
  <rect x="416" y="64" width="8" height="18" fill="#6b4520"/>
  <ellipse cx="420" cy="63" rx="7" ry="5" fill="#ffcc44"/>

  <ellipse cx="980" cy="80" rx="55" ry="45" fill="url(#torchGlow)" opacity="0.9"/>
  <rect x="976" y="64" width="8" height="18" fill="#6b4520"/>
  <ellipse cx="980" cy="63" rx="7" ry="5" fill="#ffcc44"/>

  <!-- Left wall torch -->
  <ellipse cx="82" cy="650" rx="45" ry="55" fill="url(#torchGlow)" opacity="0.8"/>
  <rect x="68" y="644" width="18" height="8" fill="#6b4520"/>
  <ellipse cx="67" cy="648" rx="5" ry="7" fill="#ffcc44"/>

  <!-- Right wall torch -->
  <ellipse cx="1318" cy="500" rx="45" ry="55" fill="url(#torchGlow)" opacity="0.8"/>
  <rect x="1314" y="494" width="18" height="8" fill="#6b4520"/>
  <ellipse cx="1333" cy="498" rx="5" ry="7" fill="#ffcc44"/>

  <!-- Column -->
  <circle cx="560" cy="500" r="28" fill="#484848" stroke="#333" stroke-width="3"/>
  <circle cx="560" cy="500" r="18" fill="#555"/>
  <circle cx="900" cy="500" r="28" fill="#484848" stroke="#333" stroke-width="3"/>
  <circle cx="900" cy="500" r="18" fill="#555"/>

  <!-- Chains hanging from ceiling -->
  <path d="M 750 80 Q 745 140 755 180 Q 765 220 755 260" fill="none" stroke="#888" stroke-width="4" stroke-linecap="round"/>
  <circle cx="755" cy="80" r="5" fill="none" stroke="#888" stroke-width="3"/>
  <circle cx="755" cy="260" r="7" fill="#888"/>

  <!-- Grid overlay -->
  <rect width="1400" height="1000" fill="url(#grid)"/>

  <!-- Room label -->
  <text x="850" y="540" fill="rgba(255,200,80,0.18)" font-size="42" font-family="serif" text-anchor="middle" font-style="italic">Dungeon Entrance</text>
</svg>
