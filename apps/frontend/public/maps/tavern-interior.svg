<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000">
  <defs>
    <radialGradient id="torch1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ff8800" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fire" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#ffdd00" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#cc2200" stop-opacity="0"/>
    </radialGradient>
    <pattern id="planks" x="0" y="0" width="70" height="140" patternUnits="userSpaceOnUse">
      <rect width="70" height="140" fill="#c8864a"/>
      <rect width="70" height="2" y="0" fill="#8b5e2a" opacity="0.6"/>
      <rect width="70" height="2" y="70" fill="#8b5e2a" opacity="0.6"/>
      <rect width="70" height="140" fill="none" stroke="#a06830" stroke-width="0.5" opacity="0.3"/>
      <line x1="15" y1="0" x2="20" y2="140" stroke="#a06030" stroke-width="0.4" opacity="0.4"/>
      <line x1="45" y1="0" x2="40" y2="140" stroke="#a06030" stroke-width="0.4" opacity="0.4"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 70 0 L 0 0 0 70" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Floor -->
  <rect width="1400" height="1000" fill="url(#planks)"/>

  <!-- Walls (border) -->
  <rect x="0" y="0" width="1400" height="70" fill="#4a2808"/>
  <rect x="0" y="930" width="1400" height="70" fill="#4a2808"/>
  <rect x="0" y="0" width="70" height="1000" fill="#4a2808"/>
  <rect x="1330" y="0" width="70" height="1000" fill="#4a2808"/>
  <!-- Stone texture on walls -->
  <rect x="0" y="0" width="1400" height="70" fill="none" stroke="#3a1800" stroke-width="1" opacity="0.5"/>
  <!-- Door in top wall -->
  <rect x="630" y="0" width="140" height="70" fill="#8b5e2a"/>
  <rect x="660" y="5" width="80" height="60" fill="#6b3d1e"/>
  <line x1="700" y1="5" x2="700" y2="65" stroke="#4a2808" stroke-width="3"/>
  <!-- Door handle -->
  <circle cx="690" cy="35" r="4" fill="#c9a227"/>

  <!-- Fireplace (left wall) -->
  <rect x="70" y="380" width="80" height="140" fill="#666666"/>
  <rect x="80" y="390" width="60" height="120" fill="#333333"/>
  <ellipse cx="110" cy="490" rx="25" ry="20" fill="url(#fire)" opacity="0.9"/>
  <ellipse cx="110" cy="490" rx="40" ry="35" fill="url(#torch1)" opacity="0.7"/>
  <!-- Fireplace mantle -->
  <rect x="65" y="375" width="90" height="12" fill="#5c3010" rx="2"/>
  <rect x="60" y="515" width="100" height="8" fill="#5c3010" rx="2"/>

  <!-- Bar counter (right side) -->
  <rect x="1130" y="140" width="200" height="720" fill="#5c3010" rx="4"/>
  <rect x="1140" y="150" width="180" height="700" fill="#6b3d1e" rx="2"/>
  <!-- Bar top -->
  <rect x="1125" y="140" width="210" height="18" fill="#8b5e2a" rx="3"/>
  <!-- Bottles on shelf -->
  <rect x="1150" y="160" width="8" height="20" fill="#2244aa" rx="2"/>
  <rect x="1162" y="163" width="8" height="17" fill="#aa4422" rx="2"/>
  <rect x="1174" y="160" width="8" height="20" fill="#228844" rx="2"/>
  <rect x="1186" y="164" width="8" height="16" fill="#884422" rx="2"/>
  <rect x="1198" y="160" width="8" height="20" fill="#aa2244" rx="2"/>
  <!-- Bar stools -->
  <circle cx="1105" cy="280" r="18" fill="#8b5e2a" stroke="#5c3010" stroke-width="2"/>
  <circle cx="1105" cy="420" r="18" fill="#8b5e2a" stroke="#5c3010" stroke-width="2"/>
  <circle cx="1105" cy="560" r="18" fill="#8b5e2a" stroke="#5c3010" stroke-width="2"/>
  <circle cx="1105" cy="700" r="18" fill="#8b5e2a" stroke="#5c3010" stroke-width="2"/>

  <!-- Tables with chairs -->
  <!-- Table 1 -->
  <circle cx="280" cy="220" r="45" fill="#8b5e2a" stroke="#5c3010" stroke-width="3"/>
  <circle cx="280" cy="155" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="345" cy="220" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="280" cy="285" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="215" cy="220" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <!-- Candle on table -->
  <rect x="277" y="208" width="6" height="12" fill="#fffff0"/>
  <ellipse cx="280" cy="207" rx="5" ry="3" fill="#ffcc44" opacity="0.8"/>

  <!-- Table 2 -->
  <circle cx="560" cy="250" r="45" fill="#8b5e2a" stroke="#5c3010" stroke-width="3"/>
  <circle cx="560" cy="185" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="625" cy="250" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="560" cy="315" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="495" cy="250" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <rect x="557" y="238" width="6" height="12" fill="#fffff0"/>
  <ellipse cx="560" cy="237" rx="5" ry="3" fill="#ffcc44" opacity="0.8"/>

  <!-- Table 3 -->
  <circle cx="320" cy="620" r="45" fill="#8b5e2a" stroke="#5c3010" stroke-width="3"/>
  <circle cx="320" cy="555" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="385" cy="620" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="320" cy="685" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="255" cy="620" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <rect x="317" y="608" width="6" height="12" fill="#fffff0"/>
  <ellipse cx="320" cy="607" rx="5" ry="3" fill="#ffcc44" opacity="0.8"/>

  <!-- Table 4 -->
  <circle cx="650" cy="680" r="45" fill="#8b5e2a" stroke="#5c3010" stroke-width="3"/>
  <circle cx="650" cy="615" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="715" cy="680" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="650" cy="745" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="585" cy="680" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <rect x="647" y="668" width="6" height="12" fill="#fffff0"/>
  <ellipse cx="650" cy="667" rx="5" ry="3" fill="#ffcc44" opacity="0.8"/>

  <!-- Table 5 (large, center) -->
  <rect x="800" y="400" width="120" height="80" fill="#8b5e2a" stroke="#5c3010" stroke-width="3" rx="8"/>
  <circle cx="860" cy="375" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="935" cy="440" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="860" cy="505" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="785" cy="440" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="920" cy="375" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>
  <circle cx="800" cy="375" r="18" fill="#6b4018" stroke="#4a2808" stroke-width="2"/>

  <!-- Rug in center -->
  <rect x="420" y="380" width="340" height="200" fill="#8b2020" opacity="0.35" rx="8"/>
  <rect x="430" y="390" width="320" height="180" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.5" rx="4"/>
  <rect x="445" y="405" width="290" height="150" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.3" rx="2"/>

  <!-- Barrels near bar -->
  <circle cx="1080" cy="160" r="22" fill="#5c3a1e" stroke="#4a2808" stroke-width="2"/>
  <ellipse cx="1080" cy="152" rx="22" ry="8" fill="#6b4520" stroke="#4a2808" stroke-width="1.5"/>
  <line x1="1058" y1="160" x2="1102" y2="160" stroke="#4a2808" stroke-width="2"/>
  <circle cx="1080" cy="210" r="22" fill="#5c3a1e" stroke="#4a2808" stroke-width="2"/>
  <ellipse cx="1080" cy="202" rx="22" ry="8" fill="#6b4520" stroke="#4a2808" stroke-width="1.5"/>
  <line x1="1058" y1="210" x2="1102" y2="210" stroke="#4a2808" stroke-width="2"/>
  <circle cx="1040" cy="185" r="22" fill="#5c3a1e" stroke="#4a2808" stroke-width="2"/>
  <ellipse cx="1040" cy="177" rx="22" ry="8" fill="#6b4520" stroke="#4a2808" stroke-width="1.5"/>

  <!-- Stairs (bottom-right corner) -->
  <rect x="1200" y="820" width="130" height="110" fill="#8b7050" stroke="#5c3010" stroke-width="2"/>
  <rect x="1210" y="830" width="110" height="14" fill="#a08060" stroke="#7a5030" stroke-width="1"/>
  <rect x="1220" y="844" width="90" height="14" fill="#a08060" stroke="#7a5030" stroke-width="1"/>
  <rect x="1230" y="858" width="70" height="14" fill="#a08060" stroke="#7a5030" stroke-width="1"/>
  <rect x="1240" y="872" width="50" height="14" fill="#a08060" stroke="#7a5030" stroke-width="1"/>
  <rect x="1250" y="886" width="30" height="14" fill="#a08060" stroke="#7a5030" stroke-width="1"/>
  <text x="1260" y="924" fill="#c9a227" font-size="11" font-family="serif" opacity="0.7">STAIRS</text>

  <!-- Torches on walls with glow -->
  <ellipse cx="280" cy="72" rx="40" ry="30" fill="url(#torch1)" opacity="0.8"/>
  <rect x="277" y="60" width="6" height="14" fill="#8b5e2a"/>
  <ellipse cx="280" cy="59" rx="6" ry="4" fill="#ffcc44"/>

  <ellipse cx="700" cy="72" rx="40" ry="30" fill="url(#torch1)" opacity="0.8"/>
  <rect x="697" y="60" width="6" height="14" fill="#8b5e2a"/>
  <ellipse cx="700" cy="59" rx="6" ry="4" fill="#ffcc44"/>

  <ellipse cx="1120" cy="72" rx="40" ry="30" fill="url(#torch1)" opacity="0.8"/>
  <rect x="1117" y="60" width="6" height="14" fill="#8b5e2a"/>
  <ellipse cx="1120" cy="59" rx="6" ry="4" fill="#ffcc44"/>

  <ellipse cx="72" cy="200" rx="30" ry="40" fill="url(#torch1)" opacity="0.7"/>
  <rect x="60" y="197" width="14" height="6" fill="#8b5e2a"/>
  <ellipse cx="59" cy="200" rx="4" ry="6" fill="#ffcc44"/>

  <ellipse cx="72" cy="750" rx="30" ry="40" fill="url(#torch1)" opacity="0.7"/>
  <rect x="60" y="747" width="14" height="6" fill="#8b5e2a"/>
  <ellipse cx="59" cy="750" rx="4" ry="6" fill="#ffcc44"/>

  <ellipse cx="1328" cy="350" rx="30" ry="40" fill="url(#torch1)" opacity="0.7"/>
  <rect x="1326" y="347" width="14" height="6" fill="#8b5e2a"/>
  <ellipse cx="1341" cy="350" rx="4" ry="6" fill="#ffcc44"/>

  <!-- Grid overlay -->
  <rect width="1400" height="1000" fill="url(#grid)"/>

  <!-- Room label -->
  <text x="500" y="530" fill="rgba(255,200,100,0.25)" font-size="48" font-family="serif" text-anchor="middle" font-style="italic">The Rusty Flagon</text>
</svg>
