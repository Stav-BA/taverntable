version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: taverntable
      POSTGRES_DB: taverntable
    ports: ['5432:5432']
    volumes: ['postgres_data:/var/lib/postgresql/data']
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
volumes:
  postgres_data:
