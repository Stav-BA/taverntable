services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: taverntable-backend
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install && node_modules/.bin/prisma generate --schema=apps/backend/src/db/schema.prisma
    startCommand: node_modules/.bin/tsx apps/backend/src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: taverntable-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: taverntable-redis
          type: redis
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false   # Set manually in Render dashboard — get free key at aistudio.google.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: taverntable-frontend
          type: web
          property: host
      - key: CORS_ORIGIN
        value: https://taverntable-frontend.onrender.com

  # ── Frontend SPA ─────────────────────────────────────────────────────────────
  - type: web
    name: taverntable-frontend
    runtime: static
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @taverntable/frontend build
    envVars:
      - key: VITE_BACKEND_URL
        value: https://taverntable-backend.onrender.com
    staticPublishPath: ./apps/frontend/dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: taverntable-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []   # allow all — backend connects via internal Render network

# ── PostgreSQL ────────────────────────────────────────────────────────────────
databases:
  - name: taverntable-db
    databaseName: taverntable
    user: taverntable
    plan: free
    postgresMajorVersion: 16
