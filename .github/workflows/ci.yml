name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r typecheck

  rules-engine-tests:
    name: Rules Engine — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dnd-vtt/dnd-rules test --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: rules-engine

  backend-tests:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dndvtt_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm --filter @dnd-vtt/backend prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dndvtt_test
      - run: pnpm --filter @dnd-vtt/backend test
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dndvtt_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  content-validation:
    name: SRD Content — Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dnd-vtt/content validate

  e2e-tests:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dndvtt_test
        ports: ['5432:5432']
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Start backend
        run: pnpm --filter @dnd-vtt/backend start &
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dndvtt_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3001
      - name: Start frontend
        run: pnpm --filter @dnd-vtt/frontend build && pnpm --filter @dnd-vtt/frontend preview &
      - run: sleep 5
      - run: pnpm --filter @dnd-vtt/frontend test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
